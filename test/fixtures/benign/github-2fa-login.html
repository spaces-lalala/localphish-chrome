<!doctype html>
<!--
  BENIGN fixture — mimics GitHub two-factor authentication page.
  Legit GitHub 2FA page asks for password + OTP, which is structurally
  identical to many phishing patterns. The form action is same-origin
  but to a different path. The page has no urgency language.

  Tests whether the LLM can tell legit 2FA flows from credential harvest.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Two-factor authentication · GitHub</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
             background: #f6f8fa; margin: 0; }
      .container { max-width: 340px; margin: 60px auto; padding: 0 16px; }
      .logo { text-align: center; margin-bottom: 16px; font-size: 32px; }
      .frame { background: white; border: 1px solid #d0d7de; border-radius: 6px;
               padding: 16px; }
      h1 { font-size: 20px; margin-top: 0; }
      label { display: block; margin-top: 16px; font-size: 14px; font-weight: 600; }
      input { width: 100%; padding: 5px 12px; margin-top: 4px; border: 1px solid #d0d7de;
              border-radius: 6px; box-sizing: border-box; font-size: 14px; }
      button { background: #2da44e; color: white; border: 0; border-radius: 6px;
               padding: 6px 16px; margin-top: 16px; width: 100%; cursor: pointer;
               font-size: 14px; }
      .note { color: #57606a; font-size: 12px; margin-top: 12px; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">🐙</div>
      <main class="frame">
        <h1>Two-factor authentication</h1>
        <p>Open the two-factor authenticator (TOTP) app on your mobile device
        to view your authentication code.</p>

        <form action="/sessions/two-factor" method="post">
          <label>Authentication code
            <input type="text" name="otp" autocomplete="one-time-code" inputmode="numeric"
                   pattern="[0-9]*" autofocus required />
          </label>
          <button type="submit">Verify</button>
        </form>

        <p class="note">
          Lost your authenticator device? You can sign in using a recovery code.
          If you do not have your recovery codes, please reach out to GitHub support.
        </p>
      </main>
    </div>
  </body>
</html>
